        .doctor-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;

        }
        .doctor-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0,150,136,0.2), 0 8px 10px -6px rgba(0,150,136,0.1);
        }
        .direction-btn-active {

        }

                        <p class="text-sm text-center text-teal-600 font-medium">${d.direction} • ${d.exp} yil</p>
                        <div class="star-rating flex justify-center my-1">
                            ${Array.from({ length: 5 }, (_, i) => `<i class="fas fa-star ${i < stars ? 'text-amber-400' : 'text-gray-300'} text-sm"></i>`).join('')}
                            <span class="text-xs text-gray-500 ml-1">(${d.rating})</span>
                        </div>
                        <p class="text-sm text-gray-700 flex items-center justify-center gap-1 mt-1"><i class="fas fa-hospital text-teal-500"></i>${d.clinic}</p>
                        <p class="text-sm text-gray-700 flex items-center justify-center gap-1"><i class="fas fa-phone text-teal-500"></i>${d.phone}</p>
                        <button class="chat-btn mt-4 w-full bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white py-2.5 rounded-xl shadow-md hover:shadow-lg transition-all font-medium" data-doctor='${JSON.stringify(d)}'><i class="fab fa-whatsapp mr-2"></i>Chat</button>
                    </div>
                `}).join('');
                document.querySelectorAll('.chat-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const doc = JSON.parse(e.target.dataset.doctor);
                        openChatModal(doc);
                    });
                });
            }

            // YANGI: Navbat bo'limi render qilish
            function renderQueueHospitals() {
                const filtered = queueFilterDirection === 'barchasi' 
                    ? queueHospitals 
                    : queueHospitals.filter(h => h.availableDirections.includes(queueFilterDirection));
                
                const container = document.getElementById('queueHospitalsList');
                container.innerHTML = filtered.map(h => {
                    // Navbat holatiga qarab badge rangi
                    let badgeClass = 'queue-badge';
                    if (h.queueStatus === 'low') badgeClass = 'queue-badge-low';
                    if (h.queueStatus === 'medium') badgeClass = 'queue-badge-medium';
                    
                    return `
                    <div class="hospital-card bg-white rounded-2xl shadow-lg p-6 border border-teal-100 hover:border-teal-300 transition-all">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-xl text-teal-700">${h.name}</h3>
                            <span class="${badgeClass} px-3 py-1 rounded-full text-xs font-bold">${h.queueLength} kishi</span>
                        </div>
                        <p class="text-gray-600 mt-2 flex items-start gap-2"><i class="fas fa-map-pin text-teal-500 mt-1"></i>${h.address}</p>
                        <p class="text-gray-600 flex items-center gap-2"><i class="fas fa-phone text-teal-500"></i>${h.phone}</p>
                        <p class="text-gray-600 flex items-center gap-2"><i class="far fa-clock text-teal-500"></i>${h.hours}</p>
                        
                        <!-- Navbat ma'lumotlari -->
                        <div class="mt-4 bg-teal-50 p-3 rounded-xl">
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-medium text-gray-700"><i class="fas fa-hourglass-half text-teal-600 mr-1"></i>Kutilayotgan vaqt:</span>
                                <span class="font-bold text-teal-700">≈ ${h.avgWaitTime} daqiqa</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2.5 mt-2">
                                <div class="bg-gradient-to-r from-teal-500 to-cyan-500 h-2.5 rounded-full" style="width: ${Math.min(100, (h.queueLength/20)*100)}%"></div>
                            </div>
                        </div>
                        
                        <!-- Mavjud shifokorlar -->
                        <div class="mt-3">
                            <p class="text-sm font-medium text-gray-600 mb-1"><i class="fas fa-user-md text-teal-500 mr-1"></i>Shifokorlar:</p>
                            <div class="flex flex-wrap gap-1">
                                ${h.doctors.map(d => `<span class="bg-gray-100 text-gray-700 px-2 py-1 rounded-full text-xs">${d}</span>`).join('')}
                            </div>
                        </div>
                        
                        <!-- Xizmatlar -->
                        <div class="flex flex-wrap gap-2 mt-3">
                            ${h.services.map(s => `<span class="bg-gradient-to-r from-teal-50 to-cyan-50 text-teal-700 px-3 py-1.5 rounded-full text-xs font-medium border border-teal-200">${s}</span>`).join('')}
                        </div>
                        
                        <!-- Navbatga olish tugmasi -->
                        <button class="queue-btn mt-4 w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-xl font-medium transition flex items-center justify-center gap-2" data-hospital='${JSON.stringify(h)}'>
                            <i class="fas fa-clock"></i> Navbatga yozilish
                        </button>
                    </div>
                `}).join('');

                // Navbat tugmalariga event listener
                document.querySelectorAll('.queue-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const hospital = JSON.parse(e.target.dataset.hospital);
                        showQueueSuccess(hospital.name);
                    });
                });
            }

            // Navbatga yozilganlik haqida xabar
            function showQueueSuccess(hospitalName) {
                const toast = document.getElementById('queueSuccessToast');
                const msg = document.getElementById('toastMessage');
                msg.innerText = `Siz ${hospitalName} navbatiga muvaffaqiyatli yozildingiz!`;
                toast.classList.remove('hidden');
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 3000);
            }

            // Qolgan render funksiyalar (qisqa)
            function renderMedicines() {
                const container = document.getElementById('medicinesList');
                container.innerHTML = medicines.map(m => `
                    <div class="medicine-card bg-white rounded-2xl shadow-lg p-5 border border-amber-100 hover:shadow-xl transition">
                        <h3 class="font-bold text-lg text-gray-800">${m.name}</h3>
                        <p class="text-sm text-red-500 font-medium mt-1">${m.disease}</p>
                        <p class="text-sm text-gray-600 mt-2">${m.desc}</p>
                        <p class="text-right font-bold text-teal-700 mt-3 text-lg">${m.price}</p>
                    </div>
                `).join('');
            }

            function renderReelsFilter() { /* avvalgidek */ }
            function renderReels() { /* avvalgidek */ }
            function updateNearestHospitals() { /* avvalgidek */ }
            function getUserLocation() { /* avvalgidek */ }

            // ---------- SUN'IY INTELLEKT JAVOB ----------
            function generateAIResponse(doctor, userMessage) { /* avvalgidek */ }

            // ---------- CHAT MODALNI OCHISH ----------
            function openChatModal(doctor) { /* avvalgidek */ }
            function renderChatMessages(docId, container) { /* avvalgidek */ }
            function openClinicDetail(clinic) { /* avvalgidek */ }
            function openReelFull(reel) { /* avvalgidek */ }
            function closeModal() { /* avvalgidek */ }

            // ---------- NAVIGATION ----------
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const sectionId = e.target.dataset.section;
                    document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
                    document.getElementById(sectionId).classList.remove('hidden');
                    if (sectionId === 'shifokorlar') { renderDirections(); renderDoctorsByDirection(selectedDirection); }
                    if (sectionId === 'navbat') { 
                        // Navbat bo'limi render qilish
                        renderQueueHospitals();
                    }
                    if (sectionId === 'dorilar') renderMedicines();
                    if (sectionId === 'reels') { renderReelsFilter(); renderReels(); }
                    if (sectionId === 'yaqin') getUserLocation();
                });
            });

            // Yo'nalish filtri o'zgarishi
            document.getElementById('directionFilter')?.addEventListener('change', (e) => {
                queueFilterDirection = e.target.value;
                renderQueueHospitals();
            });

            // INIT
            renderDirections();
            renderDoctorsByDirection(selectedDirection);
            renderMedicines();
            renderReelsFilter();
            renderReels();
            getUserLocation();
            renderQueueHospitals(); // navbat bo'limi uchun

            document.getElementById('refreshGeo').addEventListener('click', getUserLocation);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalOverlay')) closeModal();
            });
        })();
    </script>
</body>
