<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTop – rasmsiz sog'liq platformasi</title>
    <!-- Tailwind + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .glass-nav {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,150,136,0.2);
        }
        .doctor-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            background: linear-gradient(145deg, #ffffff, #f8fafc);
        }
        .doctor-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0,150,136,0.2), 0 8px 10px -6px rgba(0,150,136,0.1);
        }
        .direction-btn-active {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            color: white;
            box-shadow: 0 4px 10px rgba(20,184,166,0.3);
        }
        .clinic-card, .medicine-card, .reels-item {
            transition: all 0.2s;
        }
        .clinic-card:hover, .medicine-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.02);
        }
        .reels-scroll { scroll-snap-type: y mandatory; }
        .reels-item { scroll-snap-align: start; }
        .active-reel-filter {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            color: white;
            border-color: transparent;
        }
        .video-call-container {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: white;
        }
        .call-avatar-icon {
            font-size: 3rem;
            color: #14b8a6;
            background: #334155;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #14b8a6;
        }
    </style>
</head>

        <div class="container mx-auto px-4 flex flex-wrap items-center justify-between py-3">
            <div class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-teal-700 to-cyan-600"><i class="fas fa-heartbeat mr-2 text-teal-600"></i>MediTop</div>
            <div class="flex flex-wrap gap-1 md:gap-3 text-sm md:text-base font-medium">
                <button data-section="shifokorlar" class="nav-btn px-4 py-2 rounded-full text-teal-700 hover:bg-teal-100 hover:shadow-md transition-all duration-200">Shifokorlar</button>
                <button data-section="klinikalar" class="nav-btn px-4 py-2 rounded-full text-teal-700 hover:bg-teal-100 hover:shadow-md transition-all duration-200">Klinikalar</button>
                <button data-section="yaqin" class="nav-btn px-4 py-2 rounded-full text-teal-700 hover:bg-teal-100 hover:shadow-md transition-all duration-200">Eng yaqin shifoxona</button>
                <button data-section="dorilar" class="nav-btn px-4 py-2 rounded-full text-teal-700 hover:bg-teal-100 hover:shadow-md transition-all duration-200">Dorilar</button>
                <button data-section="reels" class="nav-btn px-4 py-2 rounded-full text-teal-700 hover:bg-teal-100 hover:shadow-md transition-all duration-200">Reels</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <!-- Shifokorlar bo'limi -->
        <section id="shifokorlar" class="section active">
            <h2 class="text-3xl font-extrabold mb-6 text-gray-800 flex items-center"><span class="bg-teal-100 p-2 rounded-xl mr-3"><i class="fas fa-user-md text-teal-600 text-2xl"></i></span> Shifokorlar</h2>
            <div class="flex flex-col md:flex-row gap-6">

                    <h3 class="font-semibold text-lg mb-4 text-teal-800"><i class="fas fa-list-ul mr-2"></i>Yo'nalishlar</h3>
                    <div id="directionList" class="flex flex-wrap md:flex-col gap-2"></div>
                </div>
                <div class="md:w-3/4">
                    <div id="doctorCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
                </div>
            </div>
        </section>

        <!-- Klinikalar -->
        <section id="klinikalar" class="section hidden">
            <h2 class="text-3xl font-extrabold mb-6 text-gray-800 flex items-center"><span class="bg-teal-100 p-2 rounded-xl mr-3"><i class="fas fa-hospital text-teal-600 text-2xl"></i></span> Klinikalar</h2>
            <div id="clinicList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <!-- Eng yaqin shifoxona -->
        <section id="yaqin" class="section hidden">
            <h2 class="text-3xl font-extrabold mb-6 text-gray-800 flex items-center"><span class="bg-teal-100 p-2 rounded-xl mr-3"><i class="fas fa-map-marker-alt text-teal-600 text-2xl"></i></span> Eng yaqin shifoxonalar</h2>
            <div class="bg-white/70 backdrop-blur-sm p-5 rounded-2xl shadow-lg border border-white/50 mb-6 flex items-center gap-3">
                <i class="fas fa-location-dot text-red-500 text-xl"></i>
                <span id="locationStatus" class="text-gray-700">Joylashuv aniqlanmoqda...</span>
                <button id="refreshGeo" class="ml-auto bg-gradient-to-r from-teal-500 to-cyan-500 text-white px-5 py-2 rounded-full text-sm shadow-md hover:shadow-lg transition"><i class="fas fa-sync-alt mr-1"></i>Yangilash</button>
            </div>
            <div id="nearestHospitals" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </section>

        <!-- Dorilar (rasmlar olib tashlandi) -->
        <section id="dorilar" class="section hidden">
            <h2 class="text-3xl font-extrabold mb-6 text-gray-800 flex items-center"><span class="bg-teal-100 p-2 rounded-xl mr-3"><i class="fas fa-pills text-teal-600 text-2xl"></i></span> Dorilar</h2>
            <div id="medicinesList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        </section>

        <!-- Reels -->
        <section id="reels" class="section hidden">
            <h2 class="text-3xl font-extrabold mb-6 text-gray-800 flex items-center"><span class="bg-teal-100 p-2 rounded-xl mr-3"><i class="fas fa-film text-teal-600 text-2xl"></i></span> Reels</h2>
            <div class="flex flex-wrap gap-2 mb-6" id="reelsDirectionFilter"></div>
            <div id="reelsContainer" class="flex flex-col items-center gap-5 max-w-md mx-auto reels-scroll h-[70vh] overflow-y-auto p-2"></div>
        </section>
    </main>

    <!-- MODAL UCHUN UMUMIY QATLAM -->

    </div>

    <!-- CHAT MODAL TEMPLATE (rasmlar olib tashlandi, ikonkalar qo'shildi) -->
    <template id="chatModalTemplate">
        <div class="flex flex-col h-[80vh] rounded-3xl overflow-hidden relative">
            <!-- Header -->

                </div>
                <div class="ml-auto flex gap-2">
                    <button id="startVideoCallBtn" class="bg-white/20 hover:bg-white/30 p-2 rounded-full"><i class="fas fa-video"></i></button>
                    <button class="closeModalBtn text-2xl hover:bg-white/20 w-8 h-8 rounded-full">&times;</button>
                </div>
            </div>
            <!-- Video call container (rasmlar o'rniga ikonkalar) -->
            <div id="videoCallContainer" class="hidden p-3 bg-slate-800 video-call-container">
                <div class="flex flex-col items-center">
                    <div class="call-avatar-icon"><i class="fas fa-user-md"></i></div>
                    <span class="text-sm font-medium mt-1">Doktor</span>
                </div>
                <div class="text-center">
                    <i class="fas fa-phone-alt text-green-400 text-xl"></i>
                    <p class="call-status">Qo'ng'iroq davom etmoqda...</p>
                </div>
                <div class="flex flex-col items-center">
                    <div class="call-avatar-icon"><i class="fas fa-user"></i></div>
                    <span class="text-sm font-medium mt-1">Siz</span>
                </div>
            </div>
            <!-- Xabarlar maydoni -->
            <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-100"></div>
            <!-- Xabar yozish -->
            <div class="p-3 border-t flex gap-2 bg-white">
                <input type="text" id="chatInput" placeholder="Xabar yozing..." class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-300">
                <button id="sendChatBtn" class="bg-gradient-to-r from-teal-500 to-cyan-500 text-white p-3 rounded-full w-12 h-12 flex items-center justify-center shadow-md hover:shadow-lg transition"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </template>

    <!-- Qolgan templatlar (clinicDetail, reelsFull) -->

        <div class="p-6 relative">
            <button class="absolute top-4 right-4 text-2xl closeModalBtn text-gray-500 hover:text-gray-800">&times;</button>

            <p class="mb-2"><i class="fas fa-map-pin w-6 text-teal-600"></i> <span id="clinicDetailAddress" class="text-gray-700"></span></p>
            <p class="mb-2"><i class="fas fa-phone w-6 text-teal-600"></i> <span id="clinicDetailPhone" class="text-gray-700"></span></p>
            <p class="mb-4"><i class="fas fa-clock w-6 text-teal-600"></i> <span id="clinicDetailHours" class="text-gray-700"></span></p>
            <div class="mt-4"><h4 class="font-semibold mb-2 text-teal-700">Xizmatlar:</h4><div id="clinicDetailServices" class="flex flex-wrap gap-2"></div></div>
        </div>
    </template>

    <template id="reelsFullTemplate">
        <div class="relative bg-black text-white rounded-3xl overflow-hidden">
            <button class="absolute top-4 right-4 text-white text-3xl z-10 closeModalBtn hover:bg-white/20 w-10 h-10 rounded-full flex items-center justify-center">&times;</button>

            // ---------- RENDER FUNKSIYALARI ----------
            function renderDirections() {
                const container = document.getElementById('directionList');
                container.innerHTML = directions.map(dir => 
                    `<button class="direction-btn px-4 py-2.5 rounded-xl text-left transition-all duration-200 ${dir === selectedDirection ? 'direction-btn-active shadow-lg' : 'bg-white/70 hover:bg-teal-50 text-gray-700'}" data-dir="${dir}">${dir}</button>`

                    btn.addEventListener('click', (e) => {
                        selectedDirection = e.target.dataset.dir;
                        renderDirections();
                        renderDoctorsByDirection(selectedDirection);
                    });
                });
            }

                const filtered = doctors.filter(d => d.direction === dir);

                        </div>
                        <h4 class="font-bold text-center mt-2 text-gray-800">${d.name}</h4>
                        <p class="text-sm text-center text-teal-600 font-medium">${d.direction} • ${d.exp} yil</p>
                        <div class="star-rating flex justify-center my-1">
                            ${Array.from({ length: 5 }, (_, i) => `<i class="fas fa-star ${i < stars ? 'text-amber-400' : 'text-gray-300'} text-sm"></i>`).join('')}
                            <span class="text-xs text-gray-500 ml-1">(${d.rating})</span>
                        </div>
                        <p class="text-sm text-gray-700 flex items-center justify-center gap-1 mt-1"><i class="fas fa-hospital text-teal-500"></i>${d.clinic}</p>
                        <p class="text-sm text-gray-700 flex items-center justify-center gap-1"><i class="fas fa-phone text-teal-500"></i>${d.phone}</p>
                        <button class="chat-btn mt-4 w-full bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white py-2.5 rounded-xl shadow-md hover:shadow-lg transition-all font-medium" data-doctor='${JSON.stringify(d)}'><i class="fab fa-whatsapp mr-2"></i>Chat</button>
                    </div>
                `}).join('');
                document.querySelectorAll('.chat-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const doc = JSON.parse(e.target.dataset.doctor);
                        openChatModal(doc);
                    });
                });
            }

            function renderClinics() {
                const container = document.getElementById('clinicList');
                container.innerHTML = clinics.map(c => `
                    <div class="clinic-card bg-white rounded-2xl shadow-lg p-6 cursor-pointer border border-teal-100 hover:border-teal-300 transition-all" data-clinic='${JSON.stringify(c)}'>
                        <h3 class="font-bold text-xl text-teal-700">${c.name}</h3>
                        <p class="text-gray-600 mt-2 flex items-start gap-2"><i class="fas fa-location-dot text-teal-500 mt-1"></i>${c.address}</p>
                        <p class="text-gray-600 flex items-center gap-2"><i class="fas fa-phone text-teal-500"></i>${c.phone}</p>
                        <p class="text-gray-600 flex items-center gap-2"><i class="far fa-clock text-teal-500"></i>${c.hours}</p>
                        <div class="flex flex-wrap gap-2 mt-4">${c.services.map(s => `<span class="bg-gradient-to-r from-teal-50 to-cyan-50 text-teal-700 px-3 py-1.5 rounded-full text-xs font-medium border border-teal-200">${s}</span>`).join('')}</div>
                    </div>
                `).join('');
                document.querySelectorAll('.clinic-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const clinic = JSON.parse(card.dataset.clinic);
                        openClinicDetail(clinic);
                    });
                });
            }

            function renderMedicines() {
                const container = document.getElementById('medicinesList');
                container.innerHTML = medicines.map(m => `
                    <div class="medicine-card bg-white rounded-2xl shadow-lg p-5 border border-amber-100 hover:shadow-xl transition">
                        <!-- Rasm butunlay olib tashlandi -->
                        <h3 class="font-bold text-lg text-gray-800">${m.name}</h3>
                        <p class="text-sm text-red-500 font-medium mt-1">${m.disease}</p>
                        <p class="text-sm text-gray-600 mt-2">${m.desc}</p>
                        <p class="text-right font-bold text-teal-700 mt-3 text-lg">${m.price}</p>
                    </div>
                `).join('');
            }

            function renderReelsFilter() {
                const uniqueDirs = [...new Set(reels.map(r => r.direction))];
                const filterContainer = document.getElementById('reelsDirectionFilter');
                filterContainer.innerHTML = `<button data-reel-direction="barchasi" class="reel-filter-btn px-5 py-2 rounded-full bg-white border border-teal-200 text-teal-700 hover:bg-teal-50 transition shadow-sm">Barchasi</button>`;
                uniqueDirs.forEach(dir => {
                    const btn = document.createElement('button');
                    btn.dataset.reelDirection = dir;
                    btn.className = `reel-filter-btn px-5 py-2 rounded-full bg-white border border-teal-200 text-teal-700 hover:bg-teal-50 transition shadow-sm`;
                    btn.textContent = dir;
                    filterContainer.appendChild(btn);
                });
                document.querySelectorAll('.reel-filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.reel-filter-btn').forEach(b => b.classList.remove('active-reel-filter', 'bg-teal-600', 'text-white'));
                        e.target.classList.add('active-reel-filter', 'bg-teal-600', 'text-white');
                        currentReelDirection = e.target.dataset.reelDirection;
                        renderReels();
                    });
                });
                document.querySelector('[data-reel-direction="barchasi"]').classList.add('active-reel-filter', 'bg-teal-600', 'text-white');
            }

            let currentReelDirection = 'barchasi';
            function renderReels() {
                const filtered = currentReelDirection === 'barchasi' ? reels : reels.filter(r => r.direction === currentReelDirection);
                const container = document.getElementById('reelsContainer');
                container.innerHTML = filtered.map((r, idx) => `
                    <div class="reels-item w-full bg-white rounded-2xl shadow-xl overflow-hidden cursor-pointer border border-gray-200" data-reel='${JSON.stringify(r)}'>
                        <img src="${r.cover}" class="w-full h-96 object-cover" alt="reels cover">
                        <div class="p-4 flex items-center gap-3">
                            <!-- Avatar o'rniga ikonka -->
                            <i class="fas fa-user-circle text-4xl text-teal-500"></i>
                            <div class="flex-1">
                                <p class="font-semibold text-gray-800">${r.name}</p>
                                <p class="text-sm text-gray-500">${r.title}</p>
                                <span class="inline-block mt-1 bg-teal-100 text-teal-700 px-2 py-0.5 rounded-full text-xs">${r.direction}</span>
                            </div>
                            <div class="flex gap-3 text-sm text-gray-600">
                                <span><i class="far fa-eye"></i> ${r.views}</span>
                                <span><i class="far fa-heart text-red-400"></i> ${r.likes}</span>
                                <span><i class="far fa-comment"></i> ${r.comments}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                document.querySelectorAll('[data-reel]').forEach(el => {
                    el.addEventListener('click', () => {
                        const reel = JSON.parse(el.dataset.reel);
                        openReelFull(reel);
                    });
                });
            }

            // Geolocation
            function distance(lat1, lon1, lat2, lon2) {
                const R = 6371;
                const dLat = (lat2-lat1)*Math.PI/180;
                const dLon = (lon2-lon1)*Math.PI/180;
                const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
                const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R*c;
            }

            function updateNearestHospitals() {
                const status = document.getElementById('locationStatus');
                if (!currentUserPos) { status.innerText = "Joylashuv aniqlanmadi"; return; }
                status.innerText = `Sizning joylashuvingiz: ${currentUserPos.lat.toFixed(3)}, ${currentUserPos.lon.toFixed(3)}`;

                const withDist = hospitals.map(h => {
                    const dist = distance(currentUserPos.lat, currentUserPos.lon, h.lat, h.lon);
                    return { ...h, dist: Math.round(dist * 10) / 10 };
                }).sort((a,b) => a.dist - b.dist).slice(0, 4);

                const container = document.getElementById('nearestHospitals');
                container.innerHTML = withDist.map(h => `
                    <div class="bg-white rounded-2xl shadow-lg p-5 border border-teal-100">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-lg text-teal-700">${h.name}</h3>
                            <span class="bg-gradient-to-r from-teal-500 to-cyan-500 text-white px-3 py-1 rounded-full text-sm shadow">${h.dist} km</span>
                        </div>
                        <p class="text-sm text-gray-600 mt-2"><i class="fas fa-map-pin text-teal-500 w-5"></i> ${h.address}</p>
                        <p class="text-sm text-gray-600"><i class="fas fa-phone text-teal-500 w-5"></i> ${h.phone}</p>
                        <details class="mt-3 text-sm">
                            <summary class="cursor-pointer text-teal-600 font-medium">Shifokorlar ro'yxati</summary>
                            <ul class="list-disc pl-5 mt-2 text-gray-600">${h.doctors.map(d => `<li>${d}</li>`).join('')}</ul>
                        </details>
                        <div class="flex flex-wrap gap-1 mt-3">${h.services.map(s => `<span class="bg-teal-50 border border-teal-200 px-3 py-1 rounded-full text-xs">${s}</span>`).join('')}</div>
                    </div>
                `).join('');
            }

            function getUserLocation() {
                document.getElementById('locationStatus').innerHTML = "<i class='fas fa-spinner fa-spin mr-2'></i>Aniqlanmoqda...";
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        currentUserPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                        updateNearestHospitals();
                    }, err => {
                        document.getElementById('locationStatus').innerText = "Joylashuvga ruxsat berilmadi, taxminiy ma'lumot ko'rsatilmoqda.";
                        updateNearestHospitals();
                    });
                } else {
                    document.getElementById('locationStatus').innerText = "Geolokatsiya qo'llab-quvvatlanmaydi";
                    updateNearestHospitals();
                }
            }

            // ---------- SUN'IY INTELLEKT JAVOB FUNKSIYASI ----------
            function generateAIResponse(doctor, userMessage) {
                const msg = userMessage.toLowerCase();
                if (msg.includes('salom') || msg.includes('assalom') || msg.includes('hayrli')) {
                    return `Va alaykum assalom! Men doktor ${doctor.name}. Qanday yordam kerak?`;
                }
                if (msg.includes('rahmat') || msg.includes('thanks')) {
                    return "Arzimaydi. Sog'lig'ingizni asrang! Yana savol bo'lsa, yozing.";
                }
                if (doctor.direction === 'Kardiolog') {
                    if (msg.includes('yurak') || msg.includes('qon bosim') || msg.includes('bosim')) 
                        return "Yurak urishi yoki qon bosim bilan bog'liq muammolaringiz bormi? Aniqroq ayting, maslahat beraman.";
                    return "Kardiolog sifatida maslahat: yurak sog'ligi uchun muntazam tekshiruvdan o'ting va sog'lom ovqatlaning.";
                }
                if (doctor.direction === 'Pediatr') {
                    if (msg.includes('bola') || msg.includes('farzand') || msg.includes('chaqaloq')) 
                        return "Farzandingiz necha yoshda? Qanday alomatlar kuzatilmoqda?";
                    return "Pediatr sifatida bolalar salomatligi haqida maslahat bera olaman. Farzandingizning yoshini ayting.";
                }
                if (doctor.direction === 'Nevrolog') {
                    if (msg.includes('bosh og\'riq') || msg.includes('bosh aylanishi')) 
                        return "Bosh og'rig'i sabablari turlicha. Qancha vaqtdan beri kuzatyapsiz?";
                    return "Nevrologik masalalarda yordam berishga tayyorman. Shikoyatingizni batafsil yozing.";
                }
                if (doctor.direction === 'Ginekolog') {
                    return "Ayollar salomatligi bo'yicha savollaringizni yozing. Maxfiylik kafolatlanadi.";
                }
                return "Tushundim. Iltimos, batafsilroq ma'lumot bering, men yordam beraman.";
            }

            // ---------- CHAT MODALNI OCHISH ----------
            function openChatModal(doctor) {
                currentChatDoctor = doctor;
                const template = document.getElementById('chatModalTemplate').content.cloneNode(true);
                const nameEl = template.getElementById('chatDoctorName');
                nameEl.innerText = doctor.name;

                const msgContainer = template.getElementById('chatMessages');
                if (!chatMessages[doctor.id]) {
                    chatMessages[doctor.id] = [
                        { text: `Assalomu alaykum, men doktor ${doctor.name}. Qanday yordam kerak?`, sent: false, time: new Date().toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'}) }
                    ];
                }
                renderChatMessages(doctor.id, msgContainer);

                const videoBtn = template.getElementById('startVideoCallBtn');
                const videoContainer = template.getElementById('videoCallContainer');

                videoBtn.addEventListener('click', () => {
                    videoContainer.classList.toggle('hidden');
                });

                const input = template.getElementById('chatInput');
                const sendBtn = template.getElementById('sendChatBtn');

                sendBtn.addEventListener('click', () => {
                    const txt = input.value.trim();
                    if (!txt) return;
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'});
                    chatMessages[doctor.id].push({ text: txt, sent: true, time: timeStr });
                    renderChatMessages(doctor.id, msgContainer);
                    input.value = '';

                    setTimeout(() => {
                        const aiResponse = generateAIResponse(doctor, txt);
                        const aiTime = new Date().toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'});
                        chatMessages[doctor.id].push({ text: aiResponse, sent: false, time: aiTime });
                        renderChatMessages(doctor.id, msgContainer);
                    }, 1200);
                });

                template.querySelector('.closeModalBtn').addEventListener('click', closeModal);
                document.getElementById('modalContent').innerHTML = '';
                document.getElementById('modalContent').appendChild(template);
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('modalOverlay').classList.add('flex');
            }

            function renderChatMessages(docId, container) {
                container.innerHTML = chatMessages[docId].map(m => `
                    <div class="flex ${m.sent ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[75%] ${m.sent ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white' : 'bg-white text-gray-800'} rounded-2xl p-3 shadow-md">
                            ${m.text}
                            <div class="text-[10px] ${m.sent ? 'text-gray-100' : 'text-gray-500'} text-right mt-1">${m.time}</div>
                        </div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            }

            function openClinicDetail(clinic) {
                const t = document.getElementById('clinicDetailTemplate').content.cloneNode(true);
                t.getElementById('clinicDetailName').innerText = clinic.name;
                t.getElementById('clinicDetailAddress').innerText = clinic.address;
                t.getElementById('clinicDetailPhone').innerText = clinic.phone;
                t.getElementById('clinicDetailHours').innerText = clinic.hours;
                const servicesDiv = t.getElementById('clinicDetailServices');
                servicesDiv.innerHTML = clinic.services.map(s => `<span class="bg-teal-100 px-4 py-2 rounded-full text-sm text-teal-700">${s}</span>`).join('');
                t.querySelector('.closeModalBtn').addEventListener('click', closeModal);
                document.getElementById('modalContent').innerHTML = '';
                document.getElementById('modalContent').appendChild(t);
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('modalOverlay').classList.add('flex');
            }

            function openReelFull(reel) {
                const t = document.getElementById('reelsFullTemplate').content.cloneNode(true);
                t.getElementById('reelsFullImage').src = reel.cover;
                t.getElementById('reelsFullLikes').innerText = reel.likes;
                t.getElementById('reelsFullComments').innerText = reel.comments;
                t.querySelector('.closeModalBtn').addEventListener('click', closeModal);
                document.getElementById('modalContent').innerHTML = '';
                document.getElementById('modalContent').appendChild(t);
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('modalOverlay').classList.add('flex');
            }

            function closeModal() {
                document.getElementById('modalOverlay').classList.add('hidden');
                document.getElementById('modalOverlay').classList.remove('flex');
                document.getElementById('modalContent').innerHTML = '';
            }

            // ---------- NAVIGATION ----------
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const sectionId = e.target.dataset.section;
                    document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
                    document.getElementById(sectionId).classList.remove('hidden');
                    if (sectionId === 'shifokorlar') { renderDirections(); renderDoctorsByDirection(selectedDirection); }
                    if (sectionId === 'klinikalar') renderClinics();
                    if (sectionId === 'dorilar') renderMedicines();
                    if (sectionId === 'reels') { renderReelsFilter(); renderReels(); }
                    if (sectionId === 'yaqin') getUserLocation();
                });
            });

            // INIT
            renderDirections();
            renderDoctorsByDirection(selectedDirection);
            renderClinics();
            renderMedicines();
            renderReelsFilter();
            renderReels();
            getUserLocation();

            document.getElementById('refreshGeo').addEventListener('click', getUserLocation);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalOverlay')) closeModal();
            });
        })();
    </script>
</body>
